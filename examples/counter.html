<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lilla · Counter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <!-- Shared example styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <style>
      lil-counter {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 40px;
      }

      span {
        min-width: 32px;
        text-align: center;
        font-weight: 600;
      }

      .box {
        max-width: 200px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <a href="/examples/" class="nav-back">&larr; Back to Examples</a>
        <h1>Counter</h1>
      </header>

      <div class="box">
        <lil-counter></lil-counter>
      </div>
    </div>

    <script type="module">
      import { Lilla } from "./assets/setup.js";

      /**
       * Minimal stateful component.
       * Demonstrates:
       * - local reactive state
       * - event handling
       * - component-scoped styles
       */
      Lilla.define("lil-counter", {
        shadow: false,
        state: {
          count: 0,
        },

        template({ state }, html) {
          return html`
            <button on:click="dec">−</button>
            <span>${state.count}</span>
            <button on:click="inc">+</button>
          `;
        },

        inc() {
          this.state.count++;
        },

        dec() {
          this.state.count--;
        },
      });
    </script>

  </body>
</html>
